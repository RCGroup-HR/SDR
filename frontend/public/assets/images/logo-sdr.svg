<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Fondo circular -->
  <circle cx="200" cy="200" r="180" fill="#31877e" opacity="0.1"/>

  <!-- Computadora -->
  <rect x="100" y="140" width="200" height="140" rx="8" fill="#31877e"/>
  <rect x="110" y="150" width="180" height="100" fill="#cde0db"/>

  <!-- Fichas de dominó en la pantalla -->
  <g transform="translate(140, 170)">
    <!-- Ficha 1 -->
    <rect x="0" y="0" width="25" height="50" rx="3" fill="white" stroke="#2d3748" stroke-width="2"/>
    <line x1="0" y1="25" x2="25" y2="25" stroke="#2d3748" stroke-width="2"/>
    <circle cx="12.5" cy="12.5" r="3" fill="#2d3748"/>
    <circle cx="8" cy="35" r="2.5" fill="#2d3748"/>
    <circle cx="17" cy="35" r="2.5" fill="#2d3748"/>
    <circle cx="8" cy="43" r="2.5" fill="#2d3748"/>
    <circle cx="17" cy="43" r="2.5" fill="#2d3748"/>

    <!-- Ficha 2 -->
    <rect x="35" y="0" width="25" height="50" rx="3" fill="white" stroke="#2d3748" stroke-width="2"/>
    <line x1="35" y1="25" x2="60" y2="25" stroke="#2d3748" stroke-width="2"/>
    <circle cx="42" cy="12.5" r="2.5" fill="#2d3748"/>
    <circle cx="53" cy="12.5" r="2.5" fill="#2d3748"/>
    <circle cx="47.5" cy="37" r="3" fill="#2d3748"/>

    <!-- Ficha 3 -->
    <rect x="70" y="0" width="25" height="50" rx="3" fill="white" stroke="#2d3748" stroke-width="2"/>
    <line x1="70" y1="25" x2="95" y2="25" stroke="#2d3748" stroke-width="2"/>
    <circle cx="77" cy="10" r="2.5" fill="#2d3748"/>
    <circle cx="88" cy="10" r="2.5" fill="#2d3748"/>
    <circle cx="82.5" cy="17" r="2.5" fill="#2d3748"/>
    <circle cx="77" cy="35" r="2.5" fill="#2d3748"/>
    <circle cx="88" cy="35" r="2.5" fill="#2d3748"/>
    <circle cx="82.5" cy="43" r="2.5" fill="#2d3748"/>
  </g>

  <!-- Base de la computadora -->
  <rect x="140" y="280" width="120" height="8" rx="4" fill="#31877e"/>
  <rect x="185" y="288" width="30" height="25" fill="#31877e"/>

  <!-- Texto SDR -->
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="#31877e" text-anchor="middle">SDR</text>

  <!-- Subtítulo -->
  <text x="200" y="365" font-family="Arial, sans-serif" font-size="16" fill="#4a5568" text-anchor="middle">Sistema de Dominó</text>

  <!-- Ing. Ronnie Hernández -->
  <text x="200" y="385" font-family="Arial, sans-serif" font-size="14" fill="#718096" text-anchor="middle">Ing. Ronnie Hernández</text>
</svg>
